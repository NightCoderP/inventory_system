<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>InvenFlow – Inventory & Sales System</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>

</head>

<body>

<div class="topbar">
  <div class="logo">📦 <span>InvenFlow</span></div>

  <div class="nav">
    <button class="active" onclick="changePage('add')">Add Product</button>
    <button onclick="changePage('sale')">Process Sale</button>
    <button onclick="changePage('history')">History</button>
  </div>
</div>

<div class="app">

  <div class="sidebar">
    <div class="sidebar-title">Inventory</div>
    <div id="sidebarItems"></div>
  </div>

  <div class="main">

    <!-- ADD PAGE -->
    <div class="page active" id="page-add">

      <div class="stats">
        <div class="stat">
          <div class="stat-label">Products</div>
          <div class="stat-value" id="totalProducts">0</div>
        </div>

        <div class="stat">
          <div class="stat-label">Stock</div>
          <div class="stat-value" id="totalStock">0</div>
        </div>

        <div class="stat">
          <div class="stat-label">Revenue</div>
          <div class="stat-value" id="totalRevenue">$0.00</div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-title">Add Product</div>

        <div class="form-grid">

          <div class="group full">
            <label>Product Name</label>
            <input type="text" id="nameInput">
            <div class="error" id="nameErr"></div>
          </div>

          <div class="group">
            <label>Price</label>
            <input type="number" id="priceInput">
            <div class="error" id="priceErr"></div>
          </div>

          <div class="group">
            <label>Stock</label>
            <input type="number" id="stockInput">
            <div class="error" id="stockErr"></div>
          </div>

        </div>

        <div class="buttons">
          <button class="btn primary" onclick="addItem()">Add</button>
          <button class="btn secondary" onclick="clearForm()">Clear</button>
        </div>

      </div>
    </div>

    <!-- SALE PAGE -->
    <div class="page" id="page-sale">

      <div class="panel">

        <div class="panel-title">Products</div>

        <input type="text" id="searchBox" placeholder="Search..." oninput="loadSaleTable()">

        <table class="table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>Price</th>
              <th>Stock</th>
            </tr>
          </thead>

          <tbody id="saleTable"></tbody>
        </table>

      </div>

      <div class="panel" id="salePanel" style="display:none">

        <div class="panel-title" id="saleTitle">Sale</div>

        <div class="form-grid">

          <div class="group">
            <label>Quantity</label>
            <input type="number" id="qtyInput">
            <div class="error" id="qtyErr"></div>
          </div>

          <div class="group">
            <label>Payment</label>

            <select id="paymentInput">
              <option value="">Select</option>
              <option>Cash</option>
              <option>Credit Card</option>
              <option>Transfer</option>
            </select>

            <div class="error" id="paymentErr"></div>
          </div>

        </div>

        <div class="buttons">
          <button class="btn primary" onclick="handleSale()">Complete</button>
          <button class="btn secondary" onclick="cancelSale()">Cancel</button>
        </div>

      </div>

    </div>

    <!-- HISTORY -->
    <div class="page" id="page-history">

      <div class="panel">
        <div class="panel-title">Sales History</div>
        <div id="historyArea"></div>
      </div>

    </div>

  </div>

</div>

<div class="modal-bg" id="receiptModal">

  <div class="modal">

    <h2 style="font-family:Inter,sans-serif">Receipt</h2>

    <div class="receipt" id="receiptBox"></div>

    <div style="margin-top:16px">
      <button class="btn primary" onclick="closeReceipt()">Done</button>
    </div>

  </div>

</div>

<div class="toast-wrap" id="toastWrap"></div>

<style>
:root{
  --bg:#0d0f14;
  --surface:#151820;
  --surface2:#1c2030;
  --border:#252a3a;
  --accent:#4ef0a0;
  --accent2:#4d9fff;
  --warn:#ff6b6b;
  --yellow:#ffd166;
  --text:#e8eaf0;
  --muted:#7b8190;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'Roboto Mono', monospace;
  min-height:100vh;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 26px;
  background:var(--surface);
  border-bottom:1px solid var(--border);
}

.logo{
  font-family:'Inter', sans-serif;
  font-size:19px;
  font-weight:700;
  color:var(--accent);
}

.logo span{
  color:white;
}

.nav{
  display:flex;
  gap:8px;
}

.nav button{
  background:transparent;
  border:1px solid var(--border);
  color:var(--muted);
  padding:7px 15px;
  border-radius:8px;
  cursor:pointer;
  font-size:12px;
  transition:.15s;
}

.nav button:hover,
.nav button.active{
  background:var(--accent);
  color:#000;
}

.app{
  display:flex;
  height:calc(100vh - 60px);
}

.sidebar{
  width:250px;
  background:var(--surface);
  border-right:1px solid var(--border);
  padding:18px;
  overflow-y:auto;
}

.sidebar-title{
  font-size:11px;
  color:var(--muted);
  margin-bottom:14px;
  letter-spacing:1px;
  text-transform:uppercase;
}

.product-card{
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:10px;
  padding:11px;
  margin-bottom:10px;
  transition:.12s;
}

.product-card:hover{
  transform:translateY(-1px);
}

.product-name{
  font-size:13px;
  margin-bottom:6px;
}

.product-meta{
  display:flex;
  justify-content:space-between;
  font-size:11px;
  color:var(--muted);
}

.badge{
  padding:2px 8px;
  border-radius:20px;
  font-size:10px;
}

.ok{
  background:#1a2f23;
  color:var(--accent);
}

.low{
  background:#322c15;
  color:var(--yellow);
}

.out{
  background:#351b1b;
  color:var(--warn);
}

.main{
  flex:1;
  overflow-y:auto;
  padding:26px;
}

.page{
  display:none;
}

.page.active{
  display:block;
}

.stats{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:14px;
  margin-bottom:22px;
}

.stat{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:13px;
  padding:18px 16px;
}

.stat-label{
  font-size:10px;
  color:var(--muted);
  margin-bottom:8px;
  text-transform:uppercase;
}

.stat-value{
  font-size:27px;
  font-family:'Inter', sans-serif;
  color:var(--accent);
  font-weight:700;
}

.panel{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:15px;
  padding:22px;
  margin-bottom:24px;
}

.panel-title{
  font-family:'Inter', sans-serif;
  font-size:16px;
  margin-bottom:20px;
  font-weight:700;
}

.form-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}

.full{
  grid-column:1/-1;
}

.group{
  display:flex;
  flex-direction:column;
  gap:6px;
}

label{
  font-size:11px;
  color:var(--muted);
}

input,
select{
  background:var(--surface2);
  border:1px solid var(--border);
  color:var(--text);
  padding:10px 13px;
  border-radius:8px;
  outline:none;
  font-family:'Roboto Mono', monospace;
}

input:focus,
select:focus{
  border-color:var(--accent2);
}

.error{
  color:var(--warn);
  font-size:11px;
  min-height:14px;
}

.buttons{
  display:flex;
  gap:10px;
  margin-top:18px;
}

.btn{
  border:none;
  cursor:pointer;
  padding:10px 18px;
  font-size:12px;
  font-family:'Roboto Mono', monospace;
}

.primary{
  background:var(--accent);
  color:#000;
  border-radius:10px;
}

.secondary{
  background:var(--surface2);
  color:white;
  border:1px solid var(--border);
  border-radius:7px;
}

.table{
  width:100%;
  border-collapse:collapse;
  margin-top:14px;
}

.table th{
  text-align:left;
  padding:10px;
  color:var(--muted);
  font-size:10px;
  border-bottom:1px solid var(--border);
}

.table td{
  padding:12px 10px;
  border-bottom:1px solid var(--border);
  font-size:13px;
}

.table tbody tr{
  cursor:pointer;
}

.table tbody tr:hover{
  background:var(--surface2);
}

.selected{
  background:#1a2f23;
}

.toast-wrap{
  position:fixed;
  top:20px;
  right:20px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.toast{
  background:var(--surface);
  border:1px solid var(--border);
  padding:12px 16px;
  border-radius:10px;
  min-width:240px;
  font-size:12px;
  animation:fadeIn .2s ease;
}

@keyframes fadeIn{
  from{
    opacity:0;
    transform:translateY(-8px);
  }
  to{
    opacity:1;
    transform:none;
  }
}

.modal-bg{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.7);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-bg.show{
  display:flex;
}

.modal{
  width:420px;
  max-width:95%;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:15px;
  padding:24px;
}

.receipt{
  background:var(--surface2);
  border:1px dashed var(--border);
  border-radius:10px;
  padding:18px;
  margin-top:15px;
  line-height:2;
  font-size:12px;
}
</style>

<script>

let appData = {
  products:[
    {
      id:'PRD-12045',
      name:'Laptop Pro',
      price:1299.99,
      stock:15
    },
    {
      id:'PRD-34211',
      name:'Wireless Mouse',
      price:49.99,
      stock:4
    }
  ],

  sales:[],
  selected:null
};

function changePage(name){

  document.querySelectorAll('.page').forEach(p=>{
    p.classList.remove('active');
  });

  document.getElementById('page-'+name).classList.add('active');

  document.querySelectorAll('.nav button').forEach(btn=>{
    btn.classList.remove('active');
  });

  if(name==='add'){
    document.querySelectorAll('.nav button')[0].classList.add('active');
  }

  if(name==='sale'){
    document.querySelectorAll('.nav button')[1].classList.add('active');
    loadSaleTable();
  }

  if(name==='history'){
    document.querySelectorAll('.nav button')[2].classList.add('active');
    loadHistory();
  }

}

function showToast(text){

  const toast=document.createElement('div');

  toast.className='toast';
  toast.innerHTML=text;

  document.getElementById('toastWrap').appendChild(toast);

  setTimeout(()=>{
    toast.style.opacity='0';
  },2400);

  setTimeout(()=>{
    toast.remove();
  },3000);

}

function refreshSidebar(){

  const area=document.getElementById('sidebarItems');

  area.innerHTML='';

  appData.products.forEach(item=>{

    let cls='ok';
    let text='OK';

    if(item.stock <= 5){
      cls='low';
      text='LOW';
    }

    if(item.stock===0){
      cls='out';
      text='OUT';
    }

    area.innerHTML += `
      <div class="product-card">
        <div class="product-name">${item.name}</div>

        <div class="product-meta">
          <span>$${item.price}</span>
          <span class="badge ${cls}">${text} · ${item.stock}</span>
        </div>
      </div>
    `;
  });

}

function loadStats(){

  document.getElementById('totalProducts').textContent =
    appData.products.length;

  let stock=0;

  appData.products.forEach(p=>{
    stock += p.stock;
  });

  document.getElementById('totalStock').textContent=stock;

  let revenue=0;

  appData.sales.forEach(s=>{
    revenue += s.total;
  });

  document.getElementById('totalRevenue').textContent =
    '$'+revenue.toFixed(2);

}

function addItem(){

  const name=document.getElementById('nameInput').value.trim();
  const price=document.getElementById('priceInput').value;
  const stock=document.getElementById('stockInput').value;

  document.getElementById('nameErr').textContent='';
  document.getElementById('priceErr').textContent='';
  document.getElementById('stockErr').textContent='';

  let ok=true;

  if(!name){
    document.getElementById('nameErr').textContent='required';
    ok=false;
  }

  if(price <= 0){
    document.getElementById('priceErr').textContent='invalid price';
    ok=false;
  }

  if(stock < 0 || stock===''){
    document.getElementById('stockErr').textContent='invalid stock';
    ok=false;
  }

  if(!ok){
    showToast('Check the form');
    return;
  }

  const exists = appData.products.find(x=>
    x.name.toLowerCase()===name.toLowerCase()
  );

  if(exists){
    showToast('Product already exists');
    return;
  }

  const cleanName =
    name.charAt(0).toUpperCase() + name.slice(1);

  const id='PRD-' + Date.now().toString().slice(-5);

  appData.products.push({
    id:id,
    name:cleanName,
    price:Number(price),
    stock:Number(stock)
  });

  clearForm();

  refreshSidebar();
  loadStats();

  showToast('Product added');

}

function clearForm(){

  document.getElementById('nameInput').value='';
  document.getElementById('priceInput').value='';
  document.getElementById('stockInput').value='';

}

function loadSaleTable(){

  const tbody=document.getElementById('saleTable');

  const q=document.getElementById('searchBox').value.toLowerCase();

  tbody.innerHTML='';

  const items=appData.products.filter(p=>
    p.name.toLowerCase().includes(q) ||
    p.id.toLowerCase().includes(q)
  );

  items.forEach(item=>{

    let selected='';

    if(appData.selected===item.id){
      selected='selected';
    }

    tbody.innerHTML += `
      <tr class="${selected}" onclick="selectItem('${item.id}')">
        <td>${item.id}</td>
        <td>${item.name}</td>
        <td>$${item.price}</td>
        <td>${item.stock}</td>
      </tr>
    `;
  });

}

function selectItem(id){

  appData.selected=id;

  const item=appData.products.find(x=>x.id===id);

  document.getElementById('salePanel').style.display='block';

  document.getElementById('saleTitle').textContent =
    'Sale - ' + item.name;

  loadSaleTable();

}

function cancelSale(){

  appData.selected=null;

  document.getElementById('salePanel').style.display='none';

  loadSaleTable();

}

function handleSale(){

  const item=appData.products.find(x=>x.id===appData.selected);

  const qty=Number(document.getElementById('qtyInput').value);

  const payment=document.getElementById('paymentInput').value;

  document.getElementById('qtyErr').textContent='';
  document.getElementById('paymentErr').textContent='';

  let ok=true;

  if(qty <= 0){
    document.getElementById('qtyErr').textContent='invalid';
    ok=false;
  }

  if(!payment){
    document.getElementById('paymentErr').textContent='required';
    ok=false;
  }

  if(!ok){
    return;
  }

  if(item.stock < qty){
    showToast('Not enough stock');
    return;
  }

  item.stock -= qty;

  const total=item.price * qty;

  const sale={
    id:'SALE-'+Date.now().toString().slice(-4),
    product:item.name,
    qty:qty,
    total:total,
    payment:payment,
    date:new Date().toLocaleString()
  };

  appData.sales.push(sale);

  document.getElementById('receiptBox').innerHTML=`
    <div>Sale ID: ${sale.id}</div>
    <div>Product: ${sale.product}</div>
    <div>Qty: ${sale.qty}</div>
    <div>Payment: ${sale.payment}</div>
    <div>Total: $${sale.total.toFixed(2)}</div>
  `;

  document.getElementById('receiptModal')
    .classList.add('show');

  cancelSale();

  refreshSidebar();
  loadStats();

  showToast('Sale completed');

}

function closeReceipt(){

  document.getElementById('receiptModal')
    .classList.remove('show');

}

function loadHistory(){

  const area=document.getElementById('historyArea');

  if(appData.sales.length===0){

    area.innerHTML=`
      <div style="color:var(--muted)">
        No sales yet
      </div>
    `;

    return;
  }

  area.innerHTML=`
    <table class="table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Product</th>
          <th>Qty</th>
          <th>Total</th>
        </tr>
      </thead>

      <tbody>
        ${
          appData.sales.map(s=>`
            <tr>
              <td>${s.id}</td>
              <td>${s.product}</td>
              <td>${s.qty}</td>
              <td>$${s.total.toFixed(2)}</td>
            </tr>
          `).join('')
        }
      </tbody>
    </table>
  `;

}

refreshSidebar();
loadStats();
loadSaleTable();

</script>

</body>
</html>
